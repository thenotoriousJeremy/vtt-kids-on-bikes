name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version and download URL into system.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          jq --arg v "$TAG" \
             --arg dl "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/system.zip" \
             '.version=$v | .download=$dl' system.json > tmp.json && mv tmp.json system.json

      - name: Zip system
        run: |
          zip -r system.zip system.json kids-on-bikes.mjs module templates css lang packs LICENSE README.md -x "packs/_source/*" -x "packs/**/LOCK"

      - name: Attach release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            system.json
            system.zip
